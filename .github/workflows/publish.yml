name: Publish

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish new version to TER
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if ! [[ "${GITHUB_REF}" =~ ^refs/tags/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Unexpected tag format: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Derive version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Derive release comment
        run: |
          comment=$(git tag -l "${VERSION}" --format='%(contents)')
          if [[ -z "${comment// }" ]]; then
            comment="Released version ${VERSION}"
          fi
          {
            echo 'TAILOR_COMMENT<<EOF'
            echo "$comment"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2
          coverage: none

      - name: Install Tailor
        run: composer global require typo3/tailor:^1.7 --prefer-dist --no-progress --no-suggest

      - name: Publish to TER
        run: |
          "$(composer global config bin-dir --absolute)/tailor" ter:publish --comment "${TAILOR_COMMENT}" "${VERSION}"
