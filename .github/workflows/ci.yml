name: CI

on:
  push:
    branches-ignore:
      - 'task/**'
      - 'bugfix/**'
      - 'feature/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: t3func
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Validate composer metadata
        run: composer validate --strict

      - name: PHP lint
        run: composer test:php:lint

      - name: Coding standards
        run: composer cgl

      - name: PHPStan
        run: composer phpstan -- --error-format=github

      - name: Unit tests
        run: composer test:php:unit

      - name: Functional tests
        run: composer test:php:functional
        env:
          COMPOSER_PROCESS_TIMEOUT: 1200
          typo3DatabaseDriver: mysqli
          typo3DatabaseHost: 127.0.0.1
          typo3DatabasePort: 3306
          typo3DatabaseName: t3func
          typo3DatabaseUsername: root
          typo3DatabasePassword: root

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Verify committed assets
        run: git diff --exit-code -- Resources/Public

  e2e:
    name: Playwright E2E (opt-in)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Playwright spec skips itself silently when BLOG_BASE_URL is
      # unset. We make that visible in CI: the job emits a clear message
      # instead of pretending to have run the tests.
      - name: Check BLOG_BASE_URL
        id: gate
        env:
          BLOG_BASE_URL: ${{ secrets.BLOG_BASE_URL }}
        run: |
          if [[ -z "${BLOG_BASE_URL:-}" ]]; then
            echo "::warning::Set the BLOG_BASE_URL secret to a running blog instance to run Playwright E2E tests. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Node.js dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.gate.outputs.skip != 'true'
        env:
          BLOG_BASE_URL: ${{ secrets.BLOG_BASE_URL }}
          BLOG_LIST_PATH: ${{ vars.BLOG_LIST_PATH || '/blog1/' }}
          BLOG_POST_PATH: ${{ vars.BLOG_POST_PATH || '/blog1/first-blog-post' }}
        run: npx playwright test

      - name: Upload Playwright report
        if: steps.gate.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
