<a href="#main-content" class="blog-skip-link">
    <f:translate key="link.skip_to_content" extensionName="Blog" />
</a>

<header class="mb-5 shadow-sm">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3" aria-label="{f:translate(key: 'navigation.main', extensionName: 'Blog')}">
        <div class="container">
            <f:link.page pageUid="{rootPage}" class="navbar-brand fw-bold fs-4">
                {siteTitle}
            </f:link.page>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" role="list">
                    <f:for each="{mainnavigation}" as="item">
                        <li class="nav-item{f:if(condition: item.active, then: ' active')}">
                            <f:if condition="{item.active}">
                                <f:then>
                                    <a class="nav-link fs-5" href="{item.link}" aria-current="page"><span>{item.title}</span></a>
                                </f:then>
                                <f:else>
                                    <a class="nav-link fs-5" href="{item.link}"><span>{item.title}</span></a>
                                </f:else>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main id="main-content">
    <f:render section="Main" />
</main>

<footer class="bg-dark text-light mt-5 py-5">
    <f:if condition="{languagenavigation}">
        <div class="container mb-3">
            <nav aria-label="{f:translate(key: 'navigation.languages', extensionName: 'Blog')}">
                <ul class="nav justify-content-center" role="list">
                    <f:for each="{languagenavigation}" as="item">
                        <li class="nav-item">
                            <f:if condition="{item.available}">
                                <f:then>
                                    <f:if condition="{item.active}">
                                        <f:then>
                                            <a class="nav-link text-light fw-bold" href="{item.link}" hreflang="{item.hreflang}" title="{item.title}" aria-current="page">
                                                <span>{item.navigationTitle}</span>
                                            </a>
                                        </f:then>
                                        <f:else>
                                            <a class="nav-link text-light" href="{item.link}" hreflang="{item.hreflang}" title="{item.title}">
                                                <span>{item.navigationTitle}</span>
                                            </a>
                                        </f:else>
                                    </f:if>
                                </f:then>
                                <f:else>
                                    <span class="nav-link text-muted">
                                        <span>{item.navigationTitle}</span>
                                    </span>
                                </f:else>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
            </nav>
        </div>
    </f:if>
    <f:if condition="{copyright}">
        <div class="container text-center text-secondary">
            <p class="mb-0">
                {copyright -> f:format.raw()}
            </p>
        </div>
    </f:if>
</footer>
